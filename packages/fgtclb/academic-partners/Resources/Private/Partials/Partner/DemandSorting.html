<html
    xmlns:ap="http://typo3.org/ns/FGTCLB/AcademicPrograms/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<div class="col-12 col-md-6 col-lg-4 col-xl-3">
    <label for="sortingField" class="form-label">
        {f:translate(key: 'sorting.sortingField.label', extensionName: 'academic_partners')}
    </label>

    <ap:form.sortingSelect
        id="sortingField"
        property="sortingField"
        value="{demand.sortingField}"
        type="fields"
        additionalAttributes="{'onchange': 'this.form.submit()'}"
        l10n="filter.sortingField"
        class="form-select"
    />
</div>

<div class="col-12 col-md-6 col-lg-4 col-xl-3">
    <label for="sortingDirection" class="form-label">
        {f:translate(key: 'sorting.sortingDirection.label', extensionName: 'academic_partners')}
    </label>

    <ap:form.sortingSelect
        id="sortingDirection"
        property="sortingDirection"
        value="{demand.sortingDirection}"
        type="directions"
        additionalAttributes="{'onchange': 'this.form.submit()'}"
        l10n="filter.sortingDirection"
        class="form-select"
    />
</div>

</html>
