<html
    lang="en"
    xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:if condition="{partner.attributes}">
    <f:then>
        <f:variable name="categoriesByType" value="{partner.attributes.allCategoriesByType}"/>
    </f:then>
    <f:else>
        <f:variable name="categoriesByType" value="{partner.categories.allCategoriesByType}"/>
    </f:else>
</f:if>

<ul class="academic-partners-categories">
    <f:for each="{categoriesByType}" key="type" as="categories">
        <f:if condition="{categories}">
            <li>
                <core:icon identifier="category_types.partners.{type}"/>

                <b>{f:translate(key: 'sys_category.academic_partners.{type}', extensionName: 'academic_partners')}:</b>

                <f:for each="{categories}" as="category" iteration="i">
                    {category.title}{f:if(condition="!{i.isLast}", then: ', ')}
                </f:for>
            </li>
        </f:if>
    </f:for>
</ul>

</html>
