<html
    lang="en"
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<div class="card flex-column-reverse academic-partners-item">
    <div class="card-content">
        <div class="card-body">
            <f:render
                partial="Partner/Header"
                arguments="{
                    header: '{f:if(condition: partner.partnerTitle, then: partner.partnerTitle, else: partner.title)}',
                    layout: '{data.header_layout}',
                    positionClass: 'card-title',
                    link: '{f:uri.page(pageUid: partner.uid)}',
                    subheader: '{data.subheader}'
                }"
            />
        </div>

        <f:if condition="{partner.attributes}">
            <ul class="list-group list-group-flush">
                <f:for each="{partner.attributes.allCategoriesByType}" as="attributes" key="category">
                    <li class="list-group-item">
                        <core:icon identifier="category_types.partners.{category}"/>

                        <b>{f:translate(key: 'sys_category.academic_partners.{category}', extensionName: 'academic_partners')}:</b>

                        <f:if condition="{attributes -> f:count()} > 0">
                            <span>
                                <f:for each="{attributes}" as="attribute" iteration="i">
                                    {attribute.title}{f:if(condition: '!{i.isLast}', then: ', ')}
                                </f:for>
                            </span>
                        </f:if>
                    </li>
                </f:for>
            </ul>
        </f:if>
    </div>

    <f:for each="{partner.media}" as="image" iteration="i">
        <f:if condition="{i.isFirst}">
            <f:image image="{image}" class="card-img-top img-fluid" alt="{image.alternative}"/>
        </f:if>
    </f:for>
</div>

</html>
