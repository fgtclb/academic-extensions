<html
    lang="en"
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>
    <f:render
        partial="Forms/Textfield"
        arguments="{
            element: {
                form: 'contract',
                identifier: 'position',
            }
        }"
    />
    <f:render
        partial="Forms/Select"
        arguments="{
            element: {
                form: 'contract',
                identifier: 'organizationalUnit',
                options: organizationalUnits,
                optionValueField: 'uid',
                optionLabelField: 'unitName',
                prependOptionValue: '',
                prependOptionLabel: '---',
            }
        }"
    />
    <f:render
        partial="Forms/Select"
        arguments="{
            element: {
                form: 'contract',
                identifier: 'functionType',
                options: functionTypes,
                optionValueField: 'uid',
                optionLabelField: 'functionName',
                prependOptionValue: '',
                prependOptionLabel: '---'
            }
        }"
    />
    <f:render
        partial="Forms/DateTime"
        arguments="{
            element: {
                form: 'contract',
                identifier: 'validFrom',
                value: '{contract.validFrom}'
            }
        }"
    />
    <f:render
        partial="Forms/DateTime"
        arguments="{
            element: {
                form: 'contract',
                identifier: 'validTo',
                value: '{contract.validTo}'
            }
        }"
    />
    <f:render
        partial="Forms/Textfield"
        arguments="{
            element: {
                form: 'contract',
                identifier: 'location',
            }
        }"
    />
    <f:render
        partial="Forms/Textfield"
        arguments="{
            element: {
                form: 'contract',
                identifier: 'room',
            }
        }"
    />
    <f:render
        partial="Forms/Wysiwyg"
        arguments="{
            element: {
                form: 'contract',
                identifier: 'officeHours'
            }
        }"
    />
</html>
