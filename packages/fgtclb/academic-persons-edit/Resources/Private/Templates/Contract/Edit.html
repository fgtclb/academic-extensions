<html
    lang="en"
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>
    <f:layout name="Default" />
    <f:section name="Main">
        <h1>Edit contract for {profile.firstName} {profile.lastName}</h1>
        <f:render
            partial="Forms/Errors"
            arguments="{object:Contract}"
        />
        <f:form
            action="update"
            name="contract"
            object="{contract}"
        >
            <f:render
                partial="Buttons/SaveExitCancel"
                arguments="{cancelUrl: cancelUrl}"
            />
            <f:render
                partial="Properties/Contract"
                arguments="{
                    contract: contract,
                    functionTypes: functionTypes,
                    organisationalUnits: organisationalUnits
                }"
            />
            <f:render
                partial="Buttons/SaveExitCancel"
                arguments="{cancelUrl: cancelUrl}"
            />
        </f:form>
    </f:section>
</html>
