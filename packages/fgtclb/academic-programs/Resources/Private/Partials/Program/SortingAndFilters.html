<html
    data-namespace-typo3-fluid="true"
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
>

<f:if condition="{settings.hideFilter} || {settings.hideSorting}">
    <f:form action="list" object="{demand}" name="demand" objectName="demand">
        <div class="row">
            <f:if condition="{settings.hideSorting}">
                <f:render
                    partial="Program/DemandSorting"
                    arguments="{_all}"
                />
            </f:if>

            <f:if condition="{settings.hideFilter}">
                <f:render
                    partial="Program/DemandCategories"
                    arguments="{_all}"
                />
            </f:if>
        </div>
    </f:form>
</f:if>

</html>
