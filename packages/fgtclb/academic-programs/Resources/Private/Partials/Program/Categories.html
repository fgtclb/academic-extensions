<html
    lang="en"
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:if condition="{program.attributes}">
    <f:then>
        <f:variable name="categoriesByType" value="{program.attributes.allCategoriesByType}" />
    </f:then>
    <f:else>
        <f:variable name="cateoriesByType" value="{program.categories.allCategoriesByType}" />
    </f:else>
</f:if>

<f:if condition="{categoriesByType}">
    <ul class="row academic-programs-categories">
        <f:for each="{categoriesByType}" key="type" as="categories">
            <li class="col-12 col-md-6 col-lg-4 col-xl-3 d-flex flex-column">
                <div class="category-header">
                    <core:icon identifier="category_types.programs.{type}"/>

                    <b>
                        {f:translate(key: 'sys_category.academic_programs.{type}', extensionName: 'academic_programs')}:
                    </b>
                </div>
                <div class="category-content">
                    <f:for each="{categories}" as="category" iteration="i">
                        {category.title}{f:if(condition: '!{i.isLast}', then: ', ')}
                    </f:for>
                </div>
            </li>
        </f:for>
    </ul>
</f:if>

</html>
